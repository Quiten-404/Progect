<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Finance - {% block title %}{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        .navbar {
            background: #000000;
            border-bottom: 2px solid #0066b3;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #0066b3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        .logo-text {
            background: linear-gradient(135deg, #ffffff 0%, #0066b3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            color: #0066b3;
            background: rgba(0, 102, 179, 0.1);
        }

        .nav-links .user-name {
            color: #0066b3;
            font-weight: 600;
            margin-right: 10px;
            border-right: 1px solid #333;
            padding-right: 15px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-links .user-name:hover {
            color: #0088ff;
            background: rgba(0, 102, 179, 0.1);
        }

        .nav-links .logout {
            color: #e0e0e0;
        }

        .nav-links .logout:hover {
            color: #ff3333;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .card {
            background: #111111;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #222;
        }

        .card h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px;
            border-left: 4px solid #0066b3;
            padding-left: 20px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 500;
            margin: 25px 0 15px;
            color: #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #1a1a1a;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #0066b3;
            border-bottom: 2px solid #0066b3;
            font-size: 13px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #222;
            color: #e0e0e0;
        }

        tr:hover {
            background: #1a1a1a;
        }

        .btn {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #0066b3;
            color: white;
        }

        .btn-primary:hover {
            background: #005099;
        }

        .btn-success {
            background: transparent;
            color: #0066b3;
            border: 1px solid #0066b3;
        }

        .btn-success:hover {
            background: #0066b3;
            color: white;
        }

        .btn-warning {
            background: transparent;
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .btn-warning:hover {
            background: #ffc107;
            color: black;
        }

        .btn-danger {
            background: transparent;
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .btn-danger:hover {
            background: #dc3545;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
            font-size: 12px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            color: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0066b3;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111111;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
        }

        .stat-card h3 {
            font-size: 11px;
            color: #0066b3;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }

        .expense {
            color: #dc3545;
            font-weight: 600;
        }

        .income {
            color: #0066b3;
            font-weight: 600;
        }

        .tab-active {
            background: #0066b3;
            color: white;
        }

        .tab-inactive {
            background: transparent;
            color: #e0e0e0;
            border: 1px solid #333;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-container">
            <a href="/web/accounts" class="logo">
                <div class="logo-icon">M</div>
                <span class="logo-text">BMW FINANCE</span>
            </a>
            <div class="nav-links">
                {% if current_user %}
                <a href="/web/profile" class="user-name">👤 {{ current_user.name }}</a>
                <a href="/web/accounts">СЧЕТА</a>
                <a href="/web/transactions">ТРАНЗАКЦИИ</a>
                <a href="/web/categories">КАТЕГОРИИ</a>
                <a href="/web/transactions/search">ПОИСК</a>
                <a href="/web/statistics">СТАТИСТИКА</a>
                <a href="/web/logout" class="logout">ВЫХОД</a>
                {% else %}
                <a href="/web/login">ВХОД</a>
                <a href="/web/register">РЕГИСТРАЦИЯ</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% if error %}
        <div class="card" style="background: #1a0000; border-color: #dc3545;">
            <p style="color: #dc3545;">⚠️ {{ error }}</p>
        </div>
        {% endif %}

        {% if success %}
        <div class="card" style="background: #001a0a; border-color: #0066b3;">
            <p style="color: #0066b3;">✓ {{ success }}</p>
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>

</html>
