{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0a0a0a;
        color: #ffffff;
    }
    .navbar {
        background: #000000;
        border-bottom: 2px solid #0066b3;
        padding: 15px 40px;
    }
    .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo {
        color: white;
        text-decoration: none;
        font-size: 24px;
        font-weight: bold;
    }
    .logo span {
        color: #0066b3;
    }
    .nav-links a {
        color: #e0e0e0;
        text-decoration: none;
        margin-left: 20px;
    }
    .container {
        max-width: 1400px;
        margin: 40px auto;
        padding: 0 40px;
    }
    .card {
        background: #111111;
        border-radius: 12px;
        padding: 30px;
        border: 1px solid #222;
    }
    .card h1 {
        font-size: 28px;
        margin-bottom: 25px;
        border-left: 4px solid #0066b3;
        padding-left: 20px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #ccc;
        font-size: 12px;
        text-transform: uppercase;
    }
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 10px 15px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        color: white;
    }
    .btn {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
    }
    .btn-success {
        background: #0066b3;
        color: white;
    }
    .btn {
        background: transparent;
        color: #e0e0e0;
        border: 1px solid #333;
    }
</style>

<div class="card">
    <h1>{{ title }}</h1>
    <form method="post">
        <div class="form-group">
            <label>Название счёта</label>
            <input type="text" name="name" value="{{ account.name if account else '' }}" required>
        </div>
        <div class="form-group">
            <label>Способ оплаты</label>
            <select name="spend_method" required>
                <option value="CARD" {% if account and account.spend_method == 'CARD' %}selected{% endif %}>💳 Карта</option>
                <option value="CASH" {% if account and account.spend_method == 'CASH' %}selected{% endif %}>💵 Наличные</option>
            </select>
        </div>
        <div class="form-group">
            <label>Баланс</label>
            <input type="number" step="0.01" name="balance" value="{{ account.balance if account else '0' }}" required>
        </div>
        <button type="submit" class="btn btn-success">💾 Сохранить</button>
        <a href="/web/accounts" class="btn">❌ Отмена</a>
    </form>
</div>
{% endblock %}
