{% extends "base.html" %}

{% block title %}Регистрация - BMW Finance{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <div style="text-align: center; margin-bottom: 30px;">
        <div
            style="width: 60px; height: 60px; background: #0066b3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <span style="font-size: 28px; font-weight: bold;">M</span>
        </div>
        <h1 style="border-left: none; text-align: center; font-size: 24px;">РЕГИСТРАЦИЯ</h1>
        <p style="color: #666; font-size: 13px; margin-top: 10px;">Станьте частью BMW Finance</p>
    </div>

    {% if error %}
    <div
        style="background: #1a0000; border: 1px solid #dc3545; border-radius: 8px; padding: 12px; margin-bottom: 20px;">
        <p style="color: #dc3545; margin: 0; font-size: 13px;">⚠️ {{ error }}</p>
    </div>
    {% endif %}

    <form method="post">
        <div class="form-group">
            <label>👤 ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
            <input type="text" name="name" placeholder="Ваше имя" required>
        </div>
        <div class="form-group">
            <label>📧 EMAIL</label>
            <input type="email" name="email" placeholder="mail@example.com" required>
        </div>
        <div class="form-group">
            <label>🔒 ПАРОЛЬ</label>
            <input type="password" name="password" placeholder="Минимум 4 символа" required>
        </div>
        <div class="form-group">
            <label>💱 ВАЛЮТА</label>
            <select name="currency">
                <option value="RUB">🇷🇺 RUB - Российский рубль</option>
                <option value="USD">🇺🇸 USD - Доллар США</option>
                <option value="EUR">🇪🇺 EUR - Евро</option>
                <option value="GBP">🇬🇧 GBP - Фунт стерлингов</option>
                <option value="CNY">🇨🇳 CNY - Китайский юань</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary"
            style="width: 100%; padding: 12px; font-size: 14px; margin-top: 10px;">
            ЗАРЕГИСТРИРОВАТЬСЯ
        </button>
    </form>

    <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #222;">
        <p style="color: #666; font-size: 13px;">Уже есть аккаунт?</p>
        <a href="/web/login" class="btn btn-success" style="margin-top: 10px; display: inline-block;">
            ВОЙТИ
        </a>
    </div>
</div>
{% endblock %}
