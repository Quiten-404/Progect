{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<form method="post">
    <div>
        <label>Название счёта</label>
        <input type="text" name="name" value="{{ account.name if account else '' }}" required>
    </div>
    <div>
        <label>Способ оплаты</label>
        <select name="spend_method" required>
            <option value="CARD" {% if account and account.spend_method=='CARD' %}selected{% endif %}>Карта</option>
            <option value="CASH" {% if account and account.spend_method=='CASH' %}selected{% endif %}>Наличные</option>
        </select>
    </div>
    <div>
        <label>Баланс</label>
        <input type="number" step="0.01" name="balance" value="{{ account.balance if account else '0' }}" required>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="/web/accounts" class="btn">Отмена</a>
</form>
{% endblock %}
